<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="korlyn-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Base background dark card -->
  <rect width="32" height="32" rx="9" fill="#07080E" />
  <!-- Glassy border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="8.5" fill="none" stroke="url(#border-grad)" stroke-width="1" />
  
  <!-- Modern stylized "K" composed of sleek, angled vectors with glow -->
  <g filter="url(#glow)">
    <!-- Vertical stem -->
    <path d="M8 7h3.5v18H8z" fill="url(#korlyn-grad)" />
    <!-- Diagonal top arm -->
    <path d="M11.5 16.5l7.5-9.5h4.5l-8 9.5z" fill="url(#korlyn-grad)" opacity="0.9" />
    <!-- Diagonal bottom arm -->
    <path d="M14 14.5l8.5 10.5h-4.5l-6.5-8z" fill="url(#korlyn-grad)" />
    <!-- Cybernetic dot accent -->
    <circle cx="21" cy="8.5" r="1.5" fill="#F472B6" />
  </g>
</svg>
