<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="helolex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="helolex-border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="helolex-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Base background dark card -->
  <rect width="32" height="32" rx="9" fill="#090514" />
  <!-- Glassy border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="8.5" fill="none" stroke="url(#helolex-border-grad)" stroke-width="1" />
  
  <!-- Modern stylized "H" with dynamic angled crossbar and glow -->
  <g filter="url(#helolex-glow)">
    <!-- Left stem -->
    <path d="M8 7h3.5v18H8z" fill="url(#helolex-grad)" />
    <!-- Right stem -->
    <path d="M20.5 7h3.5v18h-3.5z" fill="url(#helolex-grad)" />
    <!-- Angled Crossbar -->
    <path d="M11.5 14h9l-1 4.5h-8z" fill="url(#helolex-grad)" opacity="0.95" />
    <!-- Cybernetic dot accent (Cyan for high-tech Helolex theme) -->
    <circle cx="21" cy="8.5" r="1.5" fill="#22D3EE" />
  </g>
</svg>
